<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Australia LMI Calculator 2024 – Lenders Mortgage Insurance | Tabutility</title>
  <meta name="description" content="Free Australia LMI calculator. Find out exactly how much Lenders Mortgage Insurance will cost you based on your deposit, property price and LVR." />
  <meta name="keywords" content="LMI calculator australia, lenders mortgage insurance, LVR calculator, home loan deposit australia, first home buyer LMI" />
  <link rel="canonical" href="https://australia-lmi-calculator.tabutility.com/" />
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-78VZWJ5B1W"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-78VZWJ5B1W');</script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7039091592734005" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#fffbeb;}.site-nav{background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}.site-nav a{color:#a5b4fc;text-decoration:none;font-size:14px;font-family:'Segoe UI',Arial,sans-serif;}.nav-brand{color:#fff;font-weight:700;font-size:16px;font-family:'Segoe UI',Arial,sans-serif;}#ad-top,#ad-bottom{text-align:center;padding:10px;background:#fff;}</style>
</head>
<body>
  <nav class="site-nav"><span class="nav-brand">⚡ Tabutility</span><a href="https://tabutility.com">← All Tools</a></nav>
  <div id="ad-top"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="horizontal" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <div id="root"></div>
  <div id="ad-bottom"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7039091592734005" data-ad-slot="auto" data-ad-format="rectangle" data-full-width-responsive="true"></ins><script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
  <script type="text/babel">
    const { useState } = React;

    // LMI premium rates (Helia/Genworth approximate, % of loan amount)
    const LMI_RATES = [
      { lvrMin:0,   lvrMax:80,  rate:0,      label:"No LMI required" },
      { lvrMin:80,  lvrMax:85,  rate:0.0077, label:"Low LMI zone" },
      { lvrMin:85,  lvrMax:90,  rate:0.0147, label:"Standard LMI zone" },
      { lvrMin:90,  lvrMax:95,  rate:0.0296, label:"High LMI zone" },
      { lvrMin:95,  lvrMax:100, rate:0.0432, label:"Very high LMI zone" },
    ];

    function getLMIRate(lvr) {
      return LMI_RATES.find(r => lvr > r.lvrMin && lvr <= r.lvrMax) || LMI_RATES[0];
    }

    const fmt = n => "$" + Math.round(n).toLocaleString();
    const pct = n => n.toFixed(2) + "%";

    function calcRepayment(principal, annualRate, years) {
      const r = annualRate / 12;
      const n = years * 12;
      if (r === 0) return principal / n;
      return principal * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);
    }

    function App() {
      const [propertyPrice, setPropertyPrice] = useState("700000");
      const [deposit, setDeposit] = useState("70000");
      const [interestRate, setInterestRate] = useState("6.0");
      const [loanTerm, setLoanTerm] = useState("30");
      const [addToLoan, setAddToLoan] = useState(true);
      const [result, setResult] = useState(null);

      const calculate = () => {
        const price = parseFloat(propertyPrice) || 0;
        const dep = parseFloat(deposit) || 0;
        const ir = (parseFloat(interestRate) || 6) / 100;
        const term = parseInt(loanTerm) || 30;

        const loanBase = price - dep;
        const lvr = (loanBase / price) * 100;
        const lmiRateObj = getLMIRate(lvr);
        const lmiCost = loanBase * lmiRateObj.rate;
        const lmiGST = lmiCost * 0.10; // GST on LMI
        const totalLMI = lmiCost + lmiGST;
        const totalLoan = addToLoan ? loanBase + totalLMI : loanBase;
        const monthlyRepayment = calcRepayment(totalLoan, ir, term);
        const monthlyWithoutLMI = calcRepayment(loanBase, ir, term);
        const extraPerMonth = monthlyRepayment - monthlyWithoutLMI;

        // How much more deposit needed to avoid LMI?
        const targetDeposit = price * 0.20;
        const depositShortfall = Math.max(0, targetDeposit - dep);

        setResult({ price, dep, lvr, loanBase, lmiRateObj, lmiCost, lmiGST, totalLMI, totalLoan, monthlyRepayment, monthlyWithoutLMI, extraPerMonth, depositShortfall, targetDeposit, ir, term });
      };

      const inputStyle = { width:"100%", padding:"12px", border:"2px solid #fde68a", borderRadius:10, fontSize:16, boxSizing:"border-box", outline:"none" };
      const labelStyle = { display:"block", fontWeight:600, marginBottom:6, color:"#333" };

      return (
        <div style={{ fontFamily:"'Segoe UI',Arial,sans-serif", background:"#fffbeb", minHeight:"100vh", padding:"20px" }}>
          <div style={{ maxWidth:820, margin:"0 auto" }}>
            <div style={{ textAlign:"center", marginBottom:32 }}>
              <div style={{ fontSize:48, marginBottom:8 }}>🏠</div>
              <h1 style={{ margin:0, fontSize:32, fontWeight:800, color:"#1a1a2e" }}>Australia LMI Calculator</h1>
              <p style={{ margin:"8px 0 0", color:"#555", fontSize:16 }}>Lenders Mortgage Insurance — find out your LMI cost before you buy</p>
            </div>

            <div style={{ background:"#fff3cd", border:"1px solid #ffc107", borderRadius:12, padding:16, marginBottom:24, fontSize:14, color:"#664d03" }}>
              <strong>What is LMI?</strong> Lenders Mortgage Insurance protects the <em>lender</em> (not you) if you default. It's required when your deposit is <strong>less than 20%</strong> of the property value (LVR above 80%). Despite protecting the lender, you pay the premium.
            </div>

            <div style={{ background:"#fff", borderRadius:16, padding:28, boxShadow:"0 4px 24px rgba(0,0,0,0.08)", marginBottom:24 }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(190px,1fr))", gap:20 }}>
                <div>
                  <label style={labelStyle}>Property Price</label>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#666", fontWeight:700 }}>$</span>
                    <input type="number" value={propertyPrice} onChange={e=>setPropertyPrice(e.target.value)} style={{ ...inputStyle, paddingLeft:28 }} />
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Your Deposit</label>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:"#666", fontWeight:700 }}>$</span>
                    <input type="number" value={deposit} onChange={e=>setDeposit(e.target.value)} style={{ ...inputStyle, paddingLeft:28 }} />
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Interest Rate (%)</label>
                  <div style={{ position:"relative" }}>
                    <input type="number" value={interestRate} step="0.1" onChange={e=>setInterestRate(e.target.value)} style={{ ...inputStyle, paddingRight:32 }} />
                    <span style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", color:"#666" }}>%</span>
                  </div>
                </div>
                <div>
                  <label style={labelStyle}>Loan Term</label>
                  <select value={loanTerm} onChange={e=>setLoanTerm(e.target.value)} style={inputStyle}>
                    <option value="25">25 years</option>
                    <option value="30">30 years</option>
                  </select>
                </div>
              </div>
              <label style={{ display:"flex", alignItems:"center", gap:10, marginTop:16, cursor:"pointer" }}>
                <input type="checkbox" checked={addToLoan} onChange={e=>setAddToLoan(e.target.checked)} style={{ width:18, height:18 }} />
                <span style={{ fontSize:14, color:"#333" }}>Add LMI to loan amount (most common — capitalise LMI)</span>
              </label>
              <button onClick={calculate} style={{ width:"100%", marginTop:24, padding:"16px", background:"linear-gradient(135deg, #d97706, #b45309)", color:"#fff", border:"none", borderRadius:12, fontSize:18, fontWeight:700, cursor:"pointer" }}>
                Calculate LMI Cost
              </button>
            </div>

            {result && <>
              {result.lmiRateObj.rate === 0 ? (
                <div style={{ background:"#f0fdf4", border:"2px solid #bbf7d0", borderRadius:16, padding:28, textAlign:"center", marginBottom:24 }}>
                  <div style={{ fontSize:48, marginBottom:8 }}>🎉</div>
                  <div style={{ fontSize:24, fontWeight:800, color:"#059669" }}>No LMI Required!</div>
                  <div style={{ fontSize:16, color:"#555", marginTop:8 }}>Your LVR is {pct(result.lvr)} — below 80%, so no LMI applies. Great deposit!</div>
                </div>
              ) : (
                <>
                  <div style={{ background:"linear-gradient(135deg, #d97706, #b45309)", borderRadius:16, padding:28, color:"#fff", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:16, marginBottom:24 }}>
                    <div>
                      <div style={{ fontSize:13, opacity:0.8, marginBottom:4 }}>LMI Premium (incl. GST)</div>
                      <div style={{ fontSize:48, fontWeight:900 }}>{fmt(result.totalLMI)}</div>
                      <div style={{ fontSize:15, opacity:0.9 }}>LVR: {pct(result.lvr)} — {result.lmiRateObj.label}</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:13, opacity:0.8 }}>Extra monthly repayment</div>
                      <div style={{ fontSize:28, fontWeight:800 }}>{fmt(result.extraPerMonth)}/mo</div>
                      <div style={{ fontSize:13, opacity:0.8, marginTop:4 }}>Over {result.term} years: ~{fmt(result.extraPerMonth * result.term * 12)} extra</div>
                    </div>
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(160px,1fr))", gap:16, marginBottom:24 }}>
                    {[
                      { label:"Loan Amount (base)", value:fmt(result.loanBase), color:"#0369a1", bg:"#f0f9ff" },
                      { label:"LMI Premium", value:fmt(result.lmiCost), color:"#d97706", bg:"#fffbeb" },
                      { label:"GST on LMI (10%)", value:fmt(result.lmiGST), color:"#d97706", bg:"#fffbeb" },
                      { label:"Total Loan (with LMI)", value:fmt(result.totalLoan), color:"#dc2626", bg:"#fff5f5" },
                      { label:"Monthly Repayment", value:fmt(result.monthlyRepayment), color:"#7c3aed", bg:"#faf5ff" },
                    ].map((item,i)=>(
                      <div key={i} style={{ background:item.bg, borderRadius:14, padding:18, textAlign:"center", border:`2px solid ${item.color}22` }}>
                        <div style={{ fontSize:18, fontWeight:800, color:item.color }}>{item.value}</div>
                        <div style={{ fontSize:12, color:"#555", marginTop:4, fontWeight:500 }}>{item.label}</div>
                      </div>
                    ))}
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:24 }}>
                    <div style={{ background:"#fff", borderRadius:16, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
                      <h3 style={{ margin:"0 0 16px", fontSize:16, fontWeight:700, color:"#1a1a2e" }}>Full Breakdown</h3>
                      {[
                        { label:"Property Price", value:fmt(result.price) },
                        { label:"Your Deposit", value:fmt(result.dep), color:"#059669" },
                        { label:"LVR", value:pct(result.lvr), color: result.lvr > 90 ? "#dc2626" : "#d97706" },
                        { label:"LMI Rate Applied", value:pct(result.lmiRateObj.rate * 100), color:"#d97706" },
                        { label:"LMI Premium (ex GST)", value:fmt(result.lmiCost) },
                        { label:"GST (10%)", value:fmt(result.lmiGST) },
                        { label:"Total LMI Cost", value:fmt(result.totalLMI), bold:true, color:"#d97706" },
                        { label:"Monthly (without LMI)", value:fmt(result.monthlyWithoutLMI) },
                        { label:"Monthly (with LMI)", value:fmt(result.monthlyRepayment), bold:true, border:true },
                      ].map((row,i)=>(
                        <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderTop:row.border?"2px solid #e9ecef":"1px solid #f1f3f5" }}>
                          <span style={{ fontSize:14, color:"#444", fontWeight:row.bold?700:400 }}>{row.label}</span>
                          <span style={{ fontSize:14, fontWeight:row.bold?700:600, color:row.color||"#222" }}>{row.value}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{ background:"#fff", borderRadius:16, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
                      <h3 style={{ margin:"0 0 16px", fontSize:16, fontWeight:700, color:"#1a1a2e" }}>💡 How to Avoid LMI</h3>
                      <div style={{ padding:16, background:"#f0fdf4", borderRadius:12, marginBottom:16 }}>
                        <div style={{ fontSize:13, color:"#166534", fontWeight:600, marginBottom:6 }}>Extra deposit needed to reach 20%</div>
                        <div style={{ fontSize:28, fontWeight:800, color:"#059669" }}>{fmt(result.depositShortfall)}</div>
                        <div style={{ fontSize:13, color:"#555", marginTop:4 }}>Saves you {fmt(result.totalLMI)} in LMI</div>
                      </div>
                      {[
                        { title:"First Home Guarantee", desc:"Government scheme: buy with just 5% deposit, no LMI. Limited places per year." },
                        { title:"Family Home Guarantee", desc:"Single parents: 2% deposit, no LMI. Up to $750k property price." },
                        { title:"Guarantor Loan", desc:"Use a parent's property as security to avoid LMI with smaller deposit." },
                        { title:"Save the 20%", desc:"Takes longer but saves you the LMI premium and interest on it." },
                      ].map((item,i)=>(
                        <div key={i} style={{ padding:"10px 0", borderBottom:"1px solid #f1f3f5" }}>
                          <div style={{ fontSize:14, fontWeight:700, color:"#333", marginBottom:2 }}>{item.title}</div>
                          <div style={{ fontSize:13, color:"#666" }}>{item.desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </>
              )}

              <div style={{ background:"#fff", borderRadius:16, padding:24, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", marginBottom:24 }}>
                <h3 style={{ margin:"0 0 16px", fontSize:16, fontWeight:700, color:"#1a1a2e" }}>📊 LMI Rate by LVR</h3>
                <div style={{ overflowX:"auto" }}>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
                    <thead><tr style={{ background:"#fffbeb" }}>{["LVR Range","Deposit %","LMI Rate (approx)","LMI on $600k loan","LMI on $800k loan"].map(h=><th key={h} style={{ padding:"10px 12px", textAlign:"left", fontWeight:700 }}>{h}</th>)}</tr></thead>
                    <tbody>
                      {[
                        ["Up to 80%","20%+","0%","No LMI","No LMI"],
                        ["80–85%","15–20%","0.77%","~$4,620","~$6,160"],
                        ["85–90%","10–15%","1.47%","~$8,820","~$11,760"],
                        ["90–95%","5–10%","2.96%","~$17,760","~$23,680"],
                        ["95–100%","<5%","4.32%","~$25,920","~$34,560"],
                      ].map((row,i)=>(
                        <tr key={i} style={{ borderBottom:"1px solid #f1f3f5", background:i===0?"#f0fdf4":i%2===0?"#fff":"#fafafa" }}>
                          {row.map((cell,j)=><td key={j} style={{ padding:"9px 12px", color:i===0&&j>1?"#059669":j===2?"#d97706":"#333", fontWeight:j===2||i===0?600:400 }}>{cell}</td>)}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <p style={{ fontSize:12, color:"#888", marginTop:10 }}>Rates are approximate and vary by lender, loan type, and insurer (Helia/Genworth). Plus 10% GST applies. Rates shown exclude GST.</p>
              </div>
            </>}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
